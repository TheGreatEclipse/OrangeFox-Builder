name: 🦊 OrangeFox · Xiaomi Spinel

on:
  workflow_dispatch:
    inputs:

      FOX_BRANCH:
        description: "OrangeFox branch"
        required: true
        type: choice
        options:
          - "12.1  — Android 12L · VAB + AIDL fscrypt"
          - "14.1  — Android 14 · GKI 2.0 / VAB  [EXPERIMENTAL]"

      DEVICE_TREE_URL:
        description: "Device tree repo URL (e.g. https://github.com/mkpromvp/recovery_device_xiaomi_spinel.git)"
        required: true
        type: string

      DEVICE_TREE_BRANCH:
        description: "Device tree branch"
        required: true
        type: string
        default: "main"

      DEVICE_VENDOR:
        description: "Vendor name (e.g. xiaomi) — tree clones to device/<vendor>/<product>"
        required: true
        type: string
        default: "xiaomi"

      DEVICE_PRODUCT:
        description: "Product/codename (e.g. spinel) — tree clones to device/<vendor>/<product>"
        required: true
        type: string
        default: "spinel"

      OF_MAINTAINER_PATCH_VERSION:
        description: "Maintainer patch version (digits only, e.g. 1)"
        required: false
        default: "1"
        type: string

      USE_LATEST_MAGISK:
        description: "Bundle latest Magisk zip?"
        required: true
        type: choice
        options:
          - "true"
          - "false"

      LDCHECK:
        description: "Run LDCheck after build? (needs tools/ldcheck + tools/libneeds in builder branch)"
        required: false
        default: false
        type: boolean

      LDCHECKPATH:
        description: "Blob path for LDCheck (e.g. system/bin/qseecomd)"
        required: false
        default: "system/bin/qseecomd"
        type: string

      EXTRA_CMD:
        description: "Extra exports before lunch (optional)"
        required: false
        type: string

# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build:
    name: "🦊 spinel · fox_${{ github.event.inputs.FOX_BRANCH }}"
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    timeout-minutes: 720
    permissions:
      contents: read

    env:
      GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
      # ── Fixed device values ────────────────────────────────────────────────
      DEVICE:        spinel
      OEM:           xiaomi
      OF_MAINTAINER: TheGreatEclipse
      # Recovery-as-Vendor + GKI 2.0 — always vendorbootimage for spinel
      TARGET:        vendorbootimage

    steps:

      # ── Checkout builder branch (this repo) ─────────────────────────────
      - name: Checkout builder branch
        uses: actions/checkout@v4
        with:
          ref: Builder
          path: ci

      # ── Display inputs ───────────────────────────────────────────────────
      - name: Display inputs
        run: |
          echo "Branch       : ${{ github.event.inputs.FOX_BRANCH }}"
          echo "Target       : vendorbootimage (Recovery-as-Vendor · GKI 2.0)"
          echo "Device tree  : ${{ github.event.inputs.DEVICE_TREE_URL }} @ ${{ github.event.inputs.DEVICE_TREE_BRANCH }}"
          echo "Vendor       : ${{ github.event.inputs.DEVICE_VENDOR }}"
          echo "Product      : ${{ github.event.inputs.DEVICE_PRODUCT }}"
          echo "Maintainer   : TheGreatEclipse"
          echo "LDCheck      : ${{ github.event.inputs.LDCHECK }}"

      # ── Parse inputs ─────────────────────────────────────────────────────
      - name: Parse inputs
        run: |
          RAW_BRANCH="${{ github.event.inputs.FOX_BRANCH }}"
          SYNC_BRANCH=$(echo "$RAW_BRANCH" | awk '{print $1}')   # 12.1 or 14.1
          FOX_BRANCH="fox_${SYNC_BRANCH}"                        # fox_12.1 or fox_14.1
          BRANCH_INT=$(echo "$SYNC_BRANCH" | cut -d. -f1)        # 12 or 14

          # orangefox_sync.sh puts the tree at $GITHUB_WORKSPACE/OrangeFox/fox_<branch>
          SYNC_PATH="${GITHUB_WORKSPACE}/OrangeFox/${FOX_BRANCH}"

          {
            echo "FOX_BRANCH=$FOX_BRANCH"
            echo "SYNC_BRANCH=$SYNC_BRANCH"
            echo "BRANCH_INT=$BRANCH_INT"
            echo "SYNC_PATH=$SYNC_PATH"
            echo "CCACHE_DIR=$HOME/.ccache"
            echo "CHECK_LEGACY_BRANCH=false"
          } >> "$GITHUB_ENV"

      # ── Slim down the runner ─────────────────────────────────────────────
      - name: Clean up runner disk space
        uses: rokibhasansagar/slimhub_actions@main

      # ── Extra swap space ─────────────────────────────────────────────────
      - name: Add swap space (12 GB)
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      # ── Install build dependencies ────────────────────────────────────────
      - name: Install build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y aria2
          git clone https://gitlab.com/OrangeFox/misc/scripts "$HOME/ofox-scripts"
          cd "$HOME/ofox-scripts"
          sudo bash setup/android_build_env.sh

      # ── ccache ───────────────────────────────────────────────────────────
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-spinel-${{ github.event.inputs.FOX_BRANCH }}-${{ github.sha }}
          restore-keys: |
            ccache-spinel-${{ github.event.inputs.FOX_BRANCH }}-
            ccache-spinel-

      - name: Set ccache size
        run: ccache -M 50G

      # ── Git identity ──────────────────────────────────────────────────────
      - name: Configure git
        run: |
          git config --global user.name  "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git config --global color.ui   false

      # ── Sync via official orangefox_sync.sh ──────────────────────────────
      - name: Clone orangefox_sync
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/OrangeFox"
          cd "${GITHUB_WORKSPACE}/OrangeFox"
          git clone --depth=1 https://gitlab.com/OrangeFox/sync.git

      - name: Sync OrangeFox sources (orangefox_sync.sh)
        run: |
          cd "${GITHUB_WORKSPACE}/OrangeFox/sync"
          ./orangefox_sync.sh \
            --branch "$SYNC_BRANCH" \
            --path   "$SYNC_PATH"

      # ── Guava fallback for 14.1 ───────────────────────────────────────────
      - name: Ensure Guava dependency (14.1 only)
        if: env.SYNC_BRANCH == '14.1'
        run: |
          cd "$SYNC_PATH"
          if [ -f external/guava/Android.bp ] && \
             grep -q 'name:[[:space:]]*"guava"' external/guava/Android.bp; then
            echo "guava module already available."
          else
            echo "guava missing — cloning fallback..."
            rm -rf external/guava
            git clone --depth=1 \
              https://android.googlesource.com/platform/external/guava \
              external/guava
          fi

      # ── Clone device tree (user-supplied repo + branch + vendor/product) ─
      - name: Clone device tree
        run: |
          cd "$SYNC_PATH"

          DEVICE_TREE_URL="${{ github.event.inputs.DEVICE_TREE_URL }}"
          DEVICE_TREE_BRANCH="${{ github.event.inputs.DEVICE_TREE_BRANCH }}"
          DEVICE_VENDOR="${{ github.event.inputs.DEVICE_VENDOR }}"
          DEVICE_PRODUCT="${{ github.event.inputs.DEVICE_PRODUCT }}"

          if [ -z "$DEVICE_TREE_URL" ] || [ -z "$DEVICE_TREE_BRANCH" ] || \
             [ -z "$DEVICE_VENDOR" ]   || [ -z "$DEVICE_PRODUCT" ]; then
            echo "❌ DEVICE_TREE_URL, DEVICE_TREE_BRANCH, DEVICE_VENDOR and DEVICE_PRODUCT are all required."
            exit 1
          fi

          DEVICE_DIRECTORY="device/$DEVICE_VENDOR"
          DEVICE_NAME="$DEVICE_PRODUCT"

          echo "Cloning device tree: $DEVICE_TREE_URL @ $DEVICE_TREE_BRANCH"
          echo "Target path        : $DEVICE_DIRECTORY/$DEVICE_NAME"

          mkdir -p "$DEVICE_DIRECTORY"

          # Clone the user-supplied device tree repo/branch directly into device/<vendor>/<product>
          git clone --depth=1 \
            "$DEVICE_TREE_URL" \
            -b "$DEVICE_TREE_BRANCH" \
            "$DEVICE_DIRECTORY/$DEVICE_NAME"

          COMMIT_ID=$(git -C "$DEVICE_DIRECTORY/$DEVICE_NAME" rev-parse HEAD)
          {
            echo "DEVICE_NAME=$DEVICE_NAME"
            echo "DEVICE_DIRECTORY=$DEVICE_DIRECTORY"
            echo "COMMIT_ID=$COMMIT_ID"
            echo "DEVICE_TREE_URL=$DEVICE_TREE_URL"
            echo "DEVICE_TREE_BRANCH=$DEVICE_TREE_BRANCH"
          } >> "$GITHUB_ENV"

      # ── Download latest Magisk (optional) ─────────────────────────────────
      - name: Download latest Magisk
        if: github.event.inputs.USE_LATEST_MAGISK == 'true'
        run: |
          mkdir -p ~/Magisk && cd ~/Magisk
          URL=$(curl -sL https://api.github.com/repos/topjohnwu/Magisk/releases/latest \
            | jq -r '.assets[] | select(.name | startswith("Magisk-")) | .browser_download_url' \
            | head -1)
          echo "Downloading Magisk: $URL"
          aria2c "$URL" || wget "$URL"
          APK=$(ls Magisk*.apk 2>/dev/null | head -1)
          [ -n "$APK" ] && mv "$APK" "${APK%.apk}.zip"
          echo "FOX_USE_SPECIFIC_MAGISK_ZIP=$(ls ~/Magisk/Magisk*.zip | head -1)" >> "$GITHUB_ENV"

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build OrangeFox
        run: |
          set +e
          cd "$SYNC_PATH"
          source build/envsetup.sh
          set -e

          # User-supplied extras
          EXTRA="${{ github.event.inputs.EXTRA_CMD }}"
          [ -n "$EXTRA" ] && eval "$EXTRA"

          # Core build vars
          export FOX_BUILD_DEVICE="$DEVICE_NAME"
          export OF_MAINTAINER="TheGreatEclipse"
          export ALLOW_MISSING_DEPENDENCIES=true
          export FOX_USE_TWRP_RECOVERY_IMAGE_BUILDER=1
          export FOX_BUILD_TYPE="Unofficial-CI"
          export LC_ALL="C"

          # ccache
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)

          # Versioning (wiki §9 — FOX_VERSION obsolete from R11.3+)
          PATCH_VER="${{ github.event.inputs.OF_MAINTAINER_PATCH_VERSION }}"
          [ -n "$PATCH_VER" ] && export FOX_MAINTAINER_PATCH_VERSION="$PATCH_VER"

          # Magisk
          [ -n "$FOX_USE_SPECIFIC_MAGISK_ZIP" ] && \
            export FOX_USE_SPECIFIC_MAGISK_ZIP="$FOX_USE_SPECIFIC_MAGISK_ZIP"

          # Spinel: GKI 2.0 / Virtual A/B / Recovery-as-Vendor
          export FOX_AB_DEVICE=1
          export FOX_VIRTUAL_AB_DEVICE=1

          # Lunch target differs per branch (wiki build commands)
          if [ "$BRANCH_INT" = "14" ]; then
            LUNCH_TARGET="twrp_spinel-ap2a-eng"
          else
            LUNCH_TARGET="twrp_${DEVICE_NAME}-eng"
          fi

          lunch "$LUNCH_TARGET"
          make clean
          mka adbd vendorbootimage

      # ── Set build date ────────────────────────────────────────────────────
      - name: Set build date
        run: echo "BUILD_DATE=$(date +%Y%m%d)" >> "$GITHUB_ENV"

      # ── Check outputs exist ───────────────────────────────────────────────
      - name: Check build outputs
        run: |
          OUT="$SYNC_PATH/out/target/product/${DEVICE_NAME}"
          if [ -f "$OUT"/OrangeFox*.img ]; then
            echo "CHECK_IMG_IS_OK=true" >> "$GITHUB_ENV"
            echo "MD5_IMG=$(md5sum "$OUT"/OrangeFox*.img | cut -d ' ' -f1)" >> "$GITHUB_ENV"
          else
            echo "No .img found in $OUT"
          fi
          if [ -f "$OUT"/OrangeFox*.zip ]; then
            echo "CHECK_ZIP_IS_OK=true" >> "$GITHUB_ENV"
            echo "MD5_ZIP=$(md5sum "$OUT"/OrangeFox*.zip | cut -d ' ' -f1)" >> "$GITHUB_ENV"
            echo "FILENAME=$(basename "$OUT"/OrangeFox*.zip)" >> "$GITHUB_ENV"
          else
            echo "No .zip found in $OUT"
          fi

      # ── Upload build as GitHub Actions artifact ───────────────────────────
      - name: Upload artifact to GitHub
        if: env.CHECK_IMG_IS_OK == 'true' && env.CHECK_ZIP_IS_OK == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: "OrangeFox-${{ env.DEVICE_NAME }}-${{ env.FOX_BRANCH }}-${{ env.BUILD_DATE }}"
          path: |
            ${{ env.SYNC_PATH }}/out/target/product/${{ env.DEVICE_NAME }}/OrangeFox*.img
            ${{ env.SYNC_PATH }}/out/target/product/${{ env.DEVICE_NAME }}/OrangeFox*.img.tar
            ${{ env.SYNC_PATH }}/out/target/product/${{ env.DEVICE_NAME }}/OrangeFox*.zip
            ${{ env.SYNC_PATH }}/out/target/product/${{ env.DEVICE_NAME }}/ramdisk-recovery.*
          if-no-files-found: error
          retention-days: 14

      # ── LDCheck (optional) — tools/ lives in Builder branch, checked out at ci/ ──
      - name: Run LDCheck
        if: inputs.LDCHECK == 'true'
        continue-on-error: true
        run: |
          OUT="$SYNC_PATH/out/target/product/${DEVICE_NAME}/recovery/root"

          # tools/ldcheck and tools/libneeds come from the Builder branch checkout (ci/)
          if [ ! -f "ci/tools/ldcheck" ] || [ ! -f "ci/tools/libneeds" ]; then
            echo "❌ ci/tools/ldcheck or ci/tools/libneeds not found."
            echo "   Make sure both files exist in the tools/ folder of your Builder branch."
            exit 1
          fi

          cp ci/tools/libneeds "$OUT/libneeds"
          cp ci/tools/ldcheck  "$OUT/ldcheck"
          chmod +x "$OUT/ldcheck" "$OUT/libneeds"

          cd "$OUT"
          python3 ldcheck \
            -p system/lib64:vendor/lib64:system/lib:vendor/lib \
            -d ${{ inputs.LDCHECKPATH }}

          echo "LDCheck complete — review output above for missing dependencies."
